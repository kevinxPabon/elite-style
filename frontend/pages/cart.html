<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Élite Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 class="logo"><i class="fas fa-crown"></i> Élite Style</h1>
            </div>
            <ul class="navbar-menu">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="products.html">Tienda</a></li>
                <li id="nav-auth"></li>
            </ul>
            <div class="navbar-icons">
                <button class="menu-toggle" id="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- PÁGINA DEL CARRITO -->
    <div class="cart-page section">
        <div class="container">
            <h1 class="section-title">Mi Carrito</h1>

            <div class="cart-content">
                <!-- ITEMS DEL CARRITO -->
                <div class="cart-items">
                    <div id="cart-list"></div>
                </div>

                <!-- RESUMEN DEL CARRITO -->
                <aside class="cart-summary">
                    <h3>Resumen de Compra</h3>
                    
                    <div class="summary-item">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0</span>
                    </div>
                    
                    <div class="summary-item">
                        <span>Envío:</span>
                        <span id="shipping">$0</span>
                    </div>
                    
                    <div class="summary-item">
                        <span>Impuestos (19%):</span>
                        <span id="taxes">$0</span>
                    </div>
                    
                    <div class="summary-item total">
                        <span>Total:</span>
                        <span id="total">$0</span>
                    </div>

                    <button class="btn btn-primary btn-lg" id="checkout-btn" style="width: 100%; margin-top: 20px;">
                        <i class="fas fa-credit-card"></i> Proceder al Pago
                    </button>

                    <a href="products.html" class="btn btn-lg" style="width: 100%; margin-top: 10px; text-align: center;">
                        <i class="fas fa-shopping-bag"></i> Continuar Comprando
                    </a>
                </aside>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>Élite Style</h4>
                    <p>Tu tienda online premium</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 Élite Style. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <!-- Modal -->
    <div id="notification-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="notification-message"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/cart.js"></script>
</body>
</html>
